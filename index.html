<!DOCTYPE html>
<html lang="de" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Fahrcast - Reisezeit-Rechner mit Google Maps API">
  <meta name="theme-color" content="#0B3041">
  <title>Fahrcast</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://*.googleapis.com https://*.google.com https://*.gstatic.com data: blob:; connect-src 'self' https://*.googleapis.com https://*.google.com; frame-src https://*.google.com;">
  <link href="fonts/fonts.css" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f0f5f3;
      --surface: #ffffff;
      --surface2: #f5f9f7;
      --border: #d0ddd6;
      --accent: #0B3041;
      --accent2: #0B3041;
      --accent-light: rgba(11, 48, 65, 0.08);
      --accent2-light: rgba(11, 48, 65, 0.08);
      --text: #1a2e28;
      --muted: #6b8a7e;
      --success: #0B3041;
      --warning: #d4960a;
      --danger: #c53030;
      --ev-blue: #0B3041;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(11, 48, 65, 0.12), transparent),
        radial-gradient(1px 1px at 60px 70px, rgba(37, 99, 176, 0.08), transparent),
        radial-gradient(1px 1px at 130px 80px, rgba(11, 48, 65, 0.06), transparent);
      background-size: 200px 200px;
      background-attachment: fixed;
    }

    .container { max-width: 520px; margin: 0 auto; padding: 16px; }

    /* Tablet (iPad) */
    @media (min-width: 600px) {
      .container { max-width: 680px; padding: 32px; }
      header { margin-bottom: 36px; padding-top: 32px; }
      .logo { font-size: 52px; }
      .subtitle { font-size: 15px; }
      .form-card { padding: 28px; border-radius: 20px; }
      label { font-size: 13px; }
      input[type="text"], input[type="number"], select { font-size: 16px; padding: 14px 16px; }
      .toggle-btn { font-size: 14px; padding: 13px 12px; }
      .weekday-btn { width: 50px; height: 50px; font-size: 14px; }
      .calculate-btn { padding: 16px 32px; font-size: 16px; }
      .hero-card { padding: 28px; border-radius: 20px; }
      .hero-time { font-size: 56px; }
      .time-cards, .arrival-cards { gap: 12px; }
      .time-card, .arrival-card { padding: 18px 14px; border-radius: 14px; }
      .time-value, .arrival-time { font-size: 28px; }
      .delay-info { padding: 20px; border-radius: 14px; }
      .map-container { border-radius: 20px; }
      #map { height: 350px; }
      .route-info { padding: 14px 16px; }
      .ev-settings { padding: 18px; border-radius: 14px; }
    }

    /* iPad Pro / larger tablets */
    @media (min-width: 900px) {
      .container { max-width: 780px; padding: 40px; }
      .logo { font-size: 60px; }
      .form-card { padding: 36px; }
      #map { height: 420px; }
    }

    header { text-align: center; margin-bottom: 28px; padding-top: 16px; }

    .logo {
      font-size: 40px; font-weight: 700;
      color: #0B3041;
      margin-bottom: 6px; letter-spacing: -2px;
    }

    .subtitle { font-size: 13px; color: var(--muted); font-weight: 400; letter-spacing: 0.3px; }

    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: block; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); margin-bottom: 6px;
    }

    .input-wrapper { position: relative; }

    /* Waypoints */
    .waypoint-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 16px; }
    .waypoint-row .input-wrapper { flex: 1; }
    .waypoint-row label { margin-bottom: 6px; }
    .waypoint-remove-btn {
      width: 40px; height: 42px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--danger); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .waypoint-remove-btn:hover { background: rgba(197, 48, 48, 0.08); border-color: var(--danger); }
    .add-waypoint-btn {
      width: 100%; padding: 10px; border: 1.5px dashed var(--border); border-radius: 10px;
      background: transparent; color: var(--muted); font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .add-waypoint-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    input[type="text"], input[type="number"], select {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--surface2); color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 15px;
      transition: all 0.2s ease; -webkit-appearance: none;
    }

    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      outline: none; border-color: var(--accent); background: var(--surface);
      box-shadow: 0 0 0 3px rgba(11, 48, 65, 0.12);
    }

    .dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 10px 10px;
      max-height: 260px; overflow-y: auto; z-index: 1000;
      display: none; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    .dropdown.active { display: block; }

    .dropdown-item {
      padding: 12px 14px; cursor: pointer;
      transition: background 0.15s ease;
      border-bottom: 1px solid var(--surface2); font-size: 14px;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: var(--accent-light); }
    .dropdown-item-primary { font-weight: 500; color: var(--text); }
    .dropdown-item-secondary { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .mode-toggle {
      display: flex; background: var(--surface2);
      border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 20px;
    }

    .toggle-btn {
      flex: 1; padding: 11px 6px; border: none;
      background: transparent; color: var(--muted);
      font-family: 'Syne', sans-serif; font-size: 12px;
      font-weight: 600; cursor: pointer; border-radius: 8px;
      transition: all 0.2s ease; text-align: center;
      line-height: 1.3; min-width: 0;
    }
    .toggle-btn.active {
      background: var(--surface); color: var(--accent);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    /* Weekday selector */
    .weekday-selector {
      display: flex; gap: 6px; margin-bottom: 16px;
    }
    .weekday-btn {
      flex: 1; padding: 10px 0; border: 1.5px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-family: 'Syne', sans-serif; font-size: 12px;
      font-weight: 600; cursor: pointer; border-radius: 8px;
      transition: all 0.2s ease; text-align: center;
    }
    .weekday-btn.active {
      background: var(--accent); color: white;
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(11, 48, 65, 0.3);
    }

    /* iOS-style scroll wheel picker */
    .wheel-picker-container {
      display: flex; align-items: center; justify-content: center;
      gap: 4px; user-select: none;
    }
    .wheel-picker {
      position: relative; width: 72px; height: 150px;
      overflow: hidden; border-radius: 12px;
      background: var(--surface2); border: 1.5px solid var(--border);
    }
    .wheel-picker-highlight {
      position: absolute; top: 50%; left: 4px; right: 4px;
      height: 42px; transform: translateY(-50%);
      background: var(--accent-light);
      border-radius: 8px; border: 1.5px solid rgba(11, 48, 65, 0.2);
      pointer-events: none; z-index: 2;
    }
    .wheel-picker-scroll {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: scroll; -webkit-overflow-scrolling: touch;
      scroll-snap-type: y mandatory;
      will-change: scroll-position;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .wheel-picker-scroll::-webkit-scrollbar { display: none; }
    .wheel-picker-item {
      height: 42px; display: flex; align-items: center;
      justify-content: center; font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 500; color: var(--muted);
      scroll-snap-align: center; transition: color 0.15s, opacity 0.15s;
      opacity: 0.4;
    }
    .wheel-picker-item.selected {
      color: var(--text); font-weight: 700; opacity: 1;
    }
    .wheel-picker-separator {
      font-size: 24px; font-weight: 700; color: var(--text);
      font-family: 'Syne', sans-serif; padding: 0 2px;
    }
    .wheel-picker-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: var(--muted); letter-spacing: 0.5px; text-align: center;
      margin-bottom: 6px;
    }

    .checkbox-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; }

    input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }

    .checkbox-label {
      font-size: 14px; font-weight: 500; margin: 0;
      cursor: pointer; color: var(--text);
      text-transform: none; letter-spacing: 0;
    }

    .ev-section {
      background: linear-gradient(135deg, rgba(37, 99, 176, 0.06) 0%, rgba(37, 99, 176, 0.02) 100%);
      border: 1.5px solid rgba(37, 99, 176, 0.2);
      border-radius: 12px; padding: 16px; margin-top: 16px; display: none;
    }
    .ev-section.visible { display: block; }

    .ev-section-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      color: var(--ev-blue); letter-spacing: 0.5px; margin-bottom: 14px;
    }

    .ev-grid { display: flex; flex-direction: column; gap: 12px; }

    input[type="range"] {
      width: 100%; height: 8px; border-radius: 4px;
      background: linear-gradient(to right, var(--accent), var(--accent2));
      outline: none; -webkit-appearance: none; appearance: none; opacity: 0.7;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px;
      border-radius: 50%; background: var(--accent);
      cursor: pointer; border: 3px solid white;
      box-shadow: 0 2px 8px rgba(11, 48, 65, 0.4);
    }
    input[type="range"]::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(11, 48, 65, 0.4);
    }

    .slider-value {
      font-size: 14px; color: var(--text); margin-top: 6px;
      text-align: center; font-family: 'DM Mono', monospace; font-weight: 500;
    }

    .calculate-btn {
      background: linear-gradient(135deg, #0B3041 0%, #164260 100%);
      color: white; border: none; padding: 14px 28px;
      border-radius: 10px; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; cursor: pointer;
      transition: all 0.3s ease; width: 100%;
      box-shadow: 0 4px 14px rgba(11, 48, 65, 0.3);
    }
    .calculate-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(11, 48, 65, 0.4); }
    .calculate-btn:active { transform: translateY(0); }

    .results-section { display: none; }
    .results-section.visible { display: block; }

    .hero-card {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: white; border-radius: 16px; padding: 28px 20px;
      margin-bottom: 20px; box-shadow: 0 8px 24px rgba(11, 48, 65, 0.25);
      text-align: center;
    }
    .hero-time { font-size: 52px; font-weight: 700; margin-bottom: 8px; letter-spacing: -2px; }
    .hero-label { font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.95; margin-bottom: 12px; }
    .hero-meta { font-size: 12px; opacity: 0.85; line-height: 1.6; }

    .info-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; font-size: 14px; line-height: 1.6; }
    .info-box.ev { background: rgba(37, 99, 176, 0.08); border-color: rgba(37, 99, 176, 0.25); color: var(--ev-blue); }

    .time-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .time-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.2s ease;
    }
    .time-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(11, 48, 65, 0.08); }

    .time-card-time { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: -1px; font-family: 'DM Mono', monospace; }
    .time-card-info { text-align: right; }
    .time-card-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .time-card-desc { font-size: 12px; color: var(--muted); }

    .arrival-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .arrival-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative;
    }
    .arrival-card.safe { background: linear-gradient(135deg, rgba(26,122,90,0.06), rgba(26,122,90,0.02)); border-color: rgba(26,122,90,0.25); }
    .arrival-card.bestguess { background: linear-gradient(135deg, rgba(37,99,176,0.06), rgba(37,99,176,0.02)); border-color: rgba(37,99,176,0.25); }
    .arrival-card.relaxed { background: linear-gradient(135deg, rgba(212,150,10,0.06), rgba(212,150,10,0.02)); border-color: rgba(212,150,10,0.25); }

    .arrival-time { font-size: 28px; font-weight: 700; letter-spacing: -1px; font-family: 'DM Mono', monospace; }
    .arrival-card.safe .arrival-time { color: var(--success); }
    .arrival-card.bestguess .arrival-time { color: var(--accent2); }
    .arrival-card.relaxed .arrival-time { color: var(--warning); }

    .arrival-info { text-align: right; }
    .arrival-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .arrival-card.safe .arrival-label { color: var(--success); }
    .arrival-card.bestguess .arrival-label { color: var(--accent2); }
    .arrival-card.relaxed .arrival-label { color: var(--warning); }
    .arrival-desc { font-size: 12px; color: var(--muted); }

    .risk-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-right: 12px; }
    .arrival-card.safe .risk-dot { background: var(--success); }
    .arrival-card.bestguess .risk-dot { background: var(--accent2); }
    .arrival-card.relaxed .risk-dot { background: var(--warning); }

    .lang-toggle { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--border); margin-bottom: 8px; align-self: center; }
    .lang-btn { background: var(--surface); color: var(--muted); border: none; padding: 4px 12px; font-size: 12px; font-weight: 600; font-family: 'Syne', sans-serif; cursor: pointer; transition: all 0.2s; }
    .lang-btn.active { background: var(--accent); color: #fff; }

    .delay-info { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    .delay-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .delay-icon { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; font-weight: 700; }
    .delay-icon.green { background: #22a34a; }
    .delay-icon.yellow { background: #d4960a; }
    .delay-icon.red { background: #c53030; }
    .delay-text-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 2px; }
    .delay-text-main { font-size: 14px; font-weight: 600; line-height: 1.3; }
    .delay-bar { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .delay-bar-fill { height: 100%; transition: width 0.3s ease; border-radius: 3px; }

    .map-container { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: none; }
    .map-container.visible { display: block; }
    #map { width: 100%; height: 280px; }

    .route-info { padding: 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-around; gap: 8px; font-size: 13px; }
    .route-info-item { text-align: center; }
    .route-info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 4px; }
    .route-info-value { font-size: 15px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }

    .charging-stops-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .charging-stop-card {
      background: var(--surface); border: 1.5px solid rgba(37,99,176,0.2);
      border-radius: 12px; padding: 14px; display: flex; align-items: flex-start; gap: 12px;
    }
    .charging-stop-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .charging-stop-info { flex: 1; min-width: 0; }
    .charging-stop-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .charging-stop-detail { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .charging-stop-network { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-top: 4px; }
    .charging-stop-network.supercharger { background: rgba(197,48,48,0.1); color: #c53030; }
    .charging-stop-network.other { background: rgba(37,99,176,0.1); color: var(--ev-blue); }
    .charging-stop-searching { text-align: center; padding: 16px; color: var(--muted); font-size: 13px; }

    .error-message { background: rgba(197,48,48,0.08); border: 1.5px solid rgba(197,48,48,0.25); color: #c53030; padding: 14px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; line-height: 1.6; }

    @media (min-width: 600px) and (max-width: 1023px) {
      .container { max-width: 560px; }
      .hero-time { font-size: 60px; }
    }

    /* ════════════════════════════════════════
       DESKTOP LAYOUT (>= 1024px)
       ════════════════════════════════════════ */

    .desktop-topbar { display: none; }

    @media (min-width: 1024px) {

      .desktop-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 52px;
        background: rgba(240,245,243,0.97);
        border-bottom: 1px solid var(--border);
        padding: 0 36px;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .desktop-topbar-inner {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .desktop-logo {
        font-family: 'Syne', sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -1.5px;
      }
      .desktop-version {
        font-family: 'DM Mono', monospace;
        font-size: 10px;
        color: var(--muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 6px;
      }
      .desktop-subtitle {
        font-size: 12px;
        color: var(--muted);
        font-weight: 400;
        letter-spacing: 0.3px;
      }
      .desktop-lang {
        margin-bottom: 0 !important;
      }

      html, body {
        height: auto;
        min-height: 100vh;
      }

      .container {
        max-width: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        display: grid;
        grid-template-columns: 360px 1fr;
        grid-template-rows: 1fr auto;
        min-height: calc(100vh - 52px);
      }

      header {
        display: none;
      }

      .form-card {
        grid-column: 1;
        grid-row: 1;
        border-radius: 0;
        border-top: none;
        border-left: none;
        border-bottom: none;
        border-right: 1px solid var(--border);
        box-shadow: none;
        margin-bottom: 0;
        padding: 24px 22px 32px;
        position: sticky;
        top: 52px;
        height: calc(100vh - 52px);
        overflow-y: auto;
        align-self: start;
      }

      .results-column {
        grid-column: 2;
        grid-row: 1;
        padding: 28px 32px 48px;
        overflow-y: auto;
        height: calc(100vh - 52px);
      }

      .results-section {
        margin-bottom: 0;
      }

      /* Hero-Card: horizontal on desktop (when visible) */
      .hero-card {
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        text-align: left;
        padding: 24px 28px;
        border-radius: 16px;
        margin-bottom: 16px;
      }
      .hero-card[style*="display: none"],
      .hero-card[style*="display:none"] {
        display: none !important;
      }
      .hero-time {
        font-size: 64px;
        margin-bottom: 0;
        letter-spacing: -3px;
        flex-shrink: 0;
      }
      .hero-right {
        text-align: right;
        flex: 1;
        padding-left: 24px;
      }
      .hero-label {
        margin-bottom: 6px;
      }

      /* Time-Cards: 3-spaltig on desktop (when visible) */
      .time-cards {
        display: grid !important;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }
      .time-cards[style*="display: none"],
      .time-cards[style*="display:none"] {
        display: none !important;
      }
      .time-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 16px 14px;
      }
      .time-card-info {
        text-align: left;
      }

      /* Arrival-Cards: 3-spaltig on desktop (when visible) */
      .arrival-cards {
        display: grid !important;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }
      .arrival-cards[style*="display: none"],
      .arrival-cards[style*="display:none"] {
        display: none !important;
      }
      .arrival-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
      .arrival-info {
        text-align: left;
      }

      /* Map */
      #map {
        height: 300px !important;
      }
      .map-container {
        border-radius: 16px;
        margin-bottom: 20px;
      }

      /* Charging Stops: 2-spaltig */
      .charging-stops-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .delay-info {
        margin-bottom: 16px;
      }

      /* Footer: spans full width */
      footer {
        grid-column: 1 / -1;
        grid-row: 2;
      }
    }

    /* results-column: auf Mobil transparent */
    @media (max-width: 1023px) {
      .results-column {
        display: contents;
      }
      .hero-right {
        /* kein extra Layout auf Mobil */
      }
    }

    /* Mode-Toggle Icons */
    .toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .toggle-icon {
      font-size: 15px;
      flex-shrink: 0;
      line-height: 1;
    }

    /* ── Route teilen ── */
    .share-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      display: none;
    }
    .share-card.visible { display: block; }
    .share-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .share-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .share-qr {
      flex-shrink: 0;
      width: 88px;
      height: 88px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .share-qr canvas,
    .share-qr img {
      width: 80px;
      height: 80px;
    }
    .share-actions {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
    }
    .share-btn-maps {
      background: linear-gradient(135deg, #0B3041 0%, #164260 100%);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;

      font-size: 13px;

      text-align: left;

      align-items: center;

    .share-btn-copy {

      border-radius: 8px;
      padding: 10px 14px;

      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;

    .share-hint {
      font-size: 11px;
      color: var(--muted);

    function t(key, params) {
      var s = (I18N[currentLang] && I18N[currentLang][key]) || (I18N.de[key]) || key;
      if (params) {
        Object.keys(params).forEach(function(k) {
          s = s.replace('{' + k + '}', params[k]);
        });
      }
      return s;
    }

      if (dst) dst.textContent = t('subtitle');

      document.getElementById('btn-departure').querySelector('.toggle-text').innerHTML = t('btn_departure');

      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        el.textContent = t(el.getAttribute('data-i18n'));
      });
      // data-i18n-placeholder
      document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
        el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
      });

      // Days order: Mo Di Mi Do Fr Sa So = 1 2 3 4 5 6 0
      var dayOrder = [1,2,3,4,5,6,0];
      wdSel.innerHTML = '';
      dayOrder.forEach(function(d) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'weekday-btn';
        btn.dataset.day = d;
        btn.textContent = shorts[d];
        if (d === selectedWeekday) btn.classList.add('active');
        btn.addEventListener('click', function() {
          document.querySelectorAll('.weekday-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          selectedWeekday = d;

        calcBtn.textContent = t('calculate_btn');

    /* ── Search History (localStorage) ── */
    const HISTORY_KEY = 'fahrcast_search_history';
    const MAX_HISTORY = 8;

    function getSearchHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
      catch(e) { return []; }
    }

    function saveToHistory(address) {
      if (!address || address.length < 3) return;
      var history = getSearchHistory();
      // Remove duplicate (case-insensitive)
      history = history.filter(function(h) { return h.toLowerCase() !== address.toLowerCase(); });
      // Add to front
      history.unshift(address);
      // Limit
      if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
    }

    function showHistoryDropdown(dropdown, input) {
      var history = getSearchHistory();
      if (history.length === 0) return;
      dropdown.innerHTML = '';
      var headerEl = document.createElement('div');
      headerEl.className = 'dropdown-item-header';
      headerEl.textContent = currentLang === 'de' ? 'Letzte Eingaben' : 'Recent searches';
      headerEl.style.cssText = 'padding:6px 12px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;';
      dropdown.appendChild(headerEl);
      history.forEach(function(addr) {
        var item = document.createElement('div');
        item.className = 'dropdown-item';
        var primaryDiv = document.createElement('div');
        primaryDiv.className = 'dropdown-item-primary';
        primaryDiv.style.cssText = 'display:flex;align-items:center;gap:6px;';
        var clockSpan = document.createElement('span');
        clockSpan.style.cssText = 'opacity:0.4;font-size:13px;';
        clockSpan.textContent = '\u{1F551}';
        primaryDiv.appendChild(clockSpan);
        primaryDiv.appendChild(document.createTextNode(' ' + addr));
        item.appendChild(primaryDiv);
        item.addEventListener('click', function() {
          input.value = addr;
          hideDropdown(dropdown);
        });
        dropdown.appendChild(item);
      });
      dropdown.classList.add('active');
    }

    const MAX_WAYPOINTS = 5;
    let waypointCount = 0;

    function addWaypoint() {
      if (waypointCount >= MAX_WAYPOINTS) return;
      waypointCount++;
      var idx = waypointCount;
      var container = document.getElementById('waypoints-container');

      var row = document.createElement('div');
      row.className = 'waypoint-row';
      row.id = 'waypoint-row-' + idx;
      row.innerHTML = '<div style="flex:1;">'
        + '<label>' + t('waypoint_label', {idx: idx}) + '</label>'
        + '<div class="input-wrapper">'
        + '<input type="text" id="wp-' + idx + '" placeholder="' + t('address_placeholder') + '">'
        + '<div class="dropdown" id="wp-' + idx + '-dropdown"></div>'
        + '</div></div>'
        + '<button type="button" class="waypoint-remove-btn" onclick="removeWaypoint(' + idx + ')" title="' + t('remove_waypoint') + '">' + t('remove_waypoint') + '</button>';
      container.appendChild(row);

      // Setup autocomplete for new input
      setupAutocomplete('wp-' + idx, 'wp-' + idx + '-dropdown');

      updateWaypointBtn();
    }

    function removeWaypoint(idx) {
      var row = document.getElementById('waypoint-row-' + idx);
      if (row) row.remove();

      // Re-number remaining waypoints
      var container = document.getElementById('waypoints-container');
      var rows = container.querySelectorAll('.waypoint-row');
      waypointCount = rows.length;
      rows.forEach(function(r, i) {
        var n = i + 1;
        r.id = 'waypoint-row-' + n;
        r.querySelector('label').textContent = t('waypoint_label', {idx: n});
        var inp = r.querySelector('input[type="text"]');
        var dd = r.querySelector('.dropdown');
        inp.id = 'wp-' + n;
        dd.id = 'wp-' + n + '-dropdown';
        r.querySelector('.waypoint-remove-btn').setAttribute('onclick', 'removeWaypoint(' + n + ')');
      });

      updateWaypointBtn();
    }

    function updateWaypointBtn() {
      var btn = document.getElementById('add-waypoint-btn');
      var group = document.getElementById('add-waypoint-group');
      if (waypointCount >= MAX_WAYPOINTS) {
        group.style.display = 'none';
      } else {
        group.style.display = 'block';
        btn.textContent = t('add_waypoint');
      }
    }

    function getWaypoints() {
      var waypoints = [];
      for (var i = 1; i <= waypointCount; i++) {
        var inp = document.getElementById('wp-' + i);
        if (inp && inp.value.trim()) {
          waypoints.push({ location: inp.value.trim(), stopover: true });
        }
      }
      return waypoints;
    }

    function buildMapsUrl(from, to, waypoints, chargingPositions) {
      var base = 'https://www.google.com/maps/dir/?api=1';
      base += '&origin=' + encodeURIComponent(from);
      base += '&destination=' + encodeURIComponent(to);

      // Combine user waypoints + charging stop positions
      var allWps = [];
      if (waypoints && waypoints.length > 0) {
        waypoints.forEach(function(wp) {
          allWps.push(encodeURIComponent(wp.location || wp));
        });
      }
      if (chargingPositions && chargingPositions.length > 0) {
        chargingPositions.forEach(function(pos) {
          allWps.push(pos.lat.toFixed(6) + ',' + pos.lng.toFixed(6));
        });
      }
      if (allWps.length > 0) {
        base += '&waypoints=' + allWps.join('|');
      }
      base += '&travelmode=driving';
      return base;
    }

        item.className = 'wheel-picker-item';
        item.dataset.index = i;
        item.dataset.value = v.value !== undefined ? v.value : v;
        item.textContent = v.label !== undefined ? v.label : v;
        scroll.appendChild(item);
      });
      for (let i = 0; i < padCount; i++) {
        const pad = document.createElement('div');
        pad.className = 'wheel-picker-item';
        pad.textContent = '';
        scroll.appendChild(pad);
      }

      // Scroll to default
      const itemH = 42;
      scroll.scrollTop = defaultIndex * itemH;

      // Update selected state
      function updateSelected() {
        const idx = Math.round(scroll.scrollTop / itemH);
        const items = scroll.querySelectorAll('.wheel-picker-item[data-index]');
        items.forEach(it => {
          it.classList.toggle('selected', parseInt(it.dataset.index) === idx);
        });
      }

      // iOS: rely on CSS scroll-snap for snapping, JS only updates selected state
      let scrollTimer;
      let isScrolling = false;
      scroll.addEventListener('scroll', () => {
        isScrolling = true;
        clearTimeout(scrollTimer);
        // Longer debounce lets iOS momentum scrolling finish naturally
        scrollTimer = setTimeout(() => {
          isScrolling = false;
          updateSelected();
          // Only JS-snap on non-iOS or when CSS snap didn't land exactly
          const idx = Math.round(scroll.scrollTop / itemH);
          const target = idx * itemH;
          if (Math.abs(scroll.scrollTop - target) > 2) {
            scroll.scrollTo({ top: target, behavior: 'smooth' });
          }
        }, 150);
      }, { passive: true });

      // Allow click to select
      scroll.addEventListener('click', (e) => {
        const item = e.target.closest('.wheel-picker-item[data-index]');
        if (item) {
          const idx = parseInt(item.dataset.index);
          scroll.scrollTo({ top: idx * itemH, behavior: 'smooth' });
          setTimeout(updateSelected, 200);
        }
      });

      // Initial update
      setTimeout(updateSelected, 50);
    }

    function getWheelValue(scrollId) {
      const scroll = document.getElementById(scrollId);
      const idx = Math.round(scroll.scrollTop / 42);
      const items = scroll.querySelectorAll('.wheel-picker-item[data-index]');
      if (idx >= 0 && idx < items.length) {
        return parseInt(items[idx].dataset.value);
      }
      return 0;
    }

    function setWheelValue(scrollId, value) {
      var scroll = document.getElementById(scrollId);
      var items = scroll.querySelectorAll('.wheel-picker-item[data-index]');
      var targetIdx = 0;
      items.forEach(function(item, i) {
        if (parseInt(item.dataset.value) === value) targetIdx = i;
      });
      scroll.scrollTop = targetIdx * 42;
      // Update selected class
      items.forEach(function(item, i) {
        item.classList.toggle('selected', i === targetIdx);
      });
    }

    function initAllPickers() {
      const hours = [];
      for (let h = 0; h < 24; h++) {
        hours.push({ value: h, label: String(h).padStart(2, '0') });
      }
      const mins = [
        { value: 0, label: '00' },
        { value: 15, label: '15' },
        { value: 30, label: '30' },
        { value: 45, label: '45' },
      ];

      // Default: next full 15-min block
      const now = new Date();
      const curH = now.getHours();
      const curM = now.getMinutes();
      const nextMinIdx = Math.min(3, Math.ceil(curM / 15));
      const defaultH = nextMinIdx > 3 ? curH + 1 : curH;
      const defaultMIdx = nextMinIdx > 3 ? 0 : nextMinIdx;

      initWheelPicker('dep-hour-scroll', hours, Math.min(23, defaultH));
      initWheelPicker('dep-min-scroll', mins, defaultMIdx);
      initWheelPicker('arr-hour-scroll', hours, Math.min(23, defaultH + 1));
      initWheelPicker('arr-min-scroll', mins, 0);
    }

    function setupAutocomplete(inputId, dropdownId) {
      const input = document.getElementById(inputId);
      const dropdown = document.getElementById(dropdownId);

      input.addEventListener('input', (e) => {
        const query = e.target.value;
        if (!query || query.length < 2) {
          // Show history when field is cleared/short
          if (query.length === 0) showHistoryDropdown(dropdown, input);
          else hideDropdown(dropdown);
          return;
        }

        autocompleteService.getPlacePredictions({
          input: query,
          componentRestrictions: { country: 'de' },
          sessionToken: sessionToken,
        }, (predictions, status) => {
          if (status !== google.maps.places.PlacesServiceStatus.OK || !predictions) {
            hideDropdown(dropdown); return;
          }
          renderDropdown(predictions, dropdown, input);
        });
      });

      input.addEventListener('focus', (e) => {
        if (e.target.value.length >= 2) {
          dropdown.classList.add('active');
        } else {
          // Show history on focus when field is empty
          showHistoryDropdown(dropdown, input);
        }
      });
    }

    function renderDropdown(predictions, dropdown, input) {
      dropdown.innerHTML = '';
      predictions.forEach(pred => {
        const item = document.createElement('div');
        item.className = 'dropdown-item';
        const mainText = pred.structured_formatting ? pred.structured_formatting.main_text : pred.description;
        const secondaryText = pred.structured_formatting ? pred.structured_formatting.secondary_text : '';
        var primaryEl = document.createElement('div');
        primaryEl.className = 'dropdown-item-primary';
        primaryEl.textContent = mainText;
        var secondaryEl = document.createElement('div');
        secondaryEl.className = 'dropdown-item-secondary';
        secondaryEl.textContent = secondaryText || '';
        item.appendChild(primaryEl);
        item.appendChild(secondaryEl);
        item.addEventListener('click', () => {
          input.value = pred.description;
          saveToHistory(pred.description);
          hideDropdown(dropdown);
          sessionToken = new google.maps.places.AutocompleteSessionToken();
        });
        dropdown.appendChild(item);
      });
      dropdown.classList.add('active');
    }

    function hideDropdown(d) { d.classList.remove('active'); }

    function toggleModeUI() {
      // Read values from the CURRENT (still visible) picker BEFORE hiding it
      var srcHour = currentMode === 'departure' ? 'arr-hour-scroll' : 'dep-hour-scroll';
      var srcMin = currentMode === 'departure' ? 'arr-min-scroll' : 'dep-min-scroll';
      var dstHour = currentMode === 'departure' ? 'dep-hour-scroll' : 'arr-hour-scroll';
      var dstMin = currentMode === 'departure' ? 'dep-min-scroll' : 'arr-min-scroll';

      // Read from source (still visible)
      var h = getWheelValue(srcHour);
      var m = getWheelValue(srcMin);

      // Switch visibility FIRST — target must be visible before setting scrollTop
      document.getElementById('departure-mode').style.display = currentMode === 'departure' ? 'block' : 'none';
      document.getElementById('arrival-mode').style.display = currentMode === 'arrival' ? 'block' : 'none';

      // NOW set values on the newly visible picker
      setWheelValue(dstHour, h);
      setWheelValue(dstMin, m);
    }

    /* ── Build target date from weekday + time picker ── */
    function buildTargetDate(hourScrollId, minScrollId) {
      const h = getWheelValue(hourScrollId);
      const m = getWheelValue(minScrollId);

      const now = new Date();
      const target = new Date(now);
      target.setHours(h, m, 0, 0);

      // Find next occurrence of selectedWeekday
      const currentDay = now.getDay();
      let daysAhead = selectedWeekday - currentDay;
      if (daysAhead < 0) daysAhead += 7;
      if (daysAhead === 0 && target <= now) daysAhead = 7;
      target.setDate(target.getDate() + daysAhead);

      return target;
    }

    function handleCalculate() {
      const from = document.getElementById('from').value.trim();
      const to = document.getElementById('to').value.trim();
      document.getElementById('error-container').innerHTML = '';

      if (!from || !to) { showError(t('err_no_address')); return; }

      document.getElementById('results').classList.add('visible');
      document.getElementById('time-cards').style.display = 'none';
      document.getElementById('arrival-cards').style.display = 'none';
      document.getElementById('hero-card').style.display = 'none';
      document.getElementById('delay-info').style.display = 'none';
      document.getElementById('ev-info-box').style.display = 'none';
      document.getElementById('charging-stops-list').style.display = 'none';
      document.getElementById('share-card').classList.remove('visible');
      lastMapsUrl = null;
      document.getElementById('map-container').classList.remove('visible');
      // Clear old charging markers
      if (chargingMarkers) chargingMarkers.forEach(m => m.setMap(null));
      chargingMarkers = [];

      if (currentMode === 'departure') {
        const departureTime = buildTargetDate('dep-hour-scroll', 'dep-min-scroll');
        calculateRoute(from, to, departureTime, null);
      } else {
        const arrivalTime = buildTargetDate('arr-hour-scroll', 'arr-min-scroll');
        calculateRoute(from, to, null, arrivalTime);
      }
    }

    function resetBtn() {
      document.getElementById('calculate-btn').textContent = t('calculate_btn');
      document.getElementById('calculate-btn').disabled = false;
    }

    function calculateRoute(from, to, departureTime, arrivalTime) {
      // Use Directions API instead of Distance Matrix API (one less API dependency)
      var depTime = departureTime || new Date(arrivalTime.getTime() - 4 * 3600 * 1000);
      var waypoints = getWaypoints();

      var request = {
        origin: from,
        destination: to,
        waypoints: waypoints.length > 0 ? waypoints : undefined,
        optimizeWaypoints: waypoints.length > 1,
        travelMode: google.maps.TravelMode.DRIVING,
        drivingOptions: {
          departureTime: depTime,
          trafficModel: 'bestguess'
        },
        unitSystem: google.maps.UnitSystem.METRIC
      };

      // Safety timeout
      var callbackFired = false;
      setTimeout(function() {
        if (!callbackFired) {
          showBtnError(t('err_directions_timeout'));
          resetBtn();
        }
      }, 12000);

      try {
        directionsService.route(request, function(result, status) {
          callbackFired = true;
          try {
            if (status !== 'OK') {
              showBtnError(t('err_route_failed', {status: status}));
              resetBtn();
              return;
            }

            if (!result.routes || !result.routes[0] || !result.routes[0].legs || !result.routes[0].legs[0]) {
              showBtnError(t('err_no_route'));
              resetBtn();
              return;
            }

            lastChargingStopPositions = []; // Reset before new calculation
            var legs = result.routes[0].legs;
            // Sum distance & duration across all legs (waypoints create multiple legs)
            var totalDistanceM = 0, totalBaseSec = 0, totalTrafficSec = 0;
            for (var li = 0; li < legs.length; li++) {
              totalDistanceM += legs[li].distance.value;
              totalBaseSec += legs[li].duration.value;
              totalTrafficSec += (legs[li].duration_in_traffic ? legs[li].duration_in_traffic.value : legs[li].duration.value);
            }
            var distanceKm = totalDistanceM / 1000;

            var baseSec = totalBaseSec;
            var trafficSec = totalTrafficSec;

            var scenarios = {
              optimistic: { durationSeconds: Math.ceil(trafficSec * 0.85) },
              bestGuess:  { durationSeconds: trafficSec },
              pessimistic:{ durationSeconds: Math.ceil(trafficSec * 1.25) }
            };

            // Calculate EV charging time
            var chargingTimeMin = 0;
            if (document.getElementById('ev-toggle').checked) {
              chargingTimeMin = getChargingTime(distanceKm);
            }

            lastResults = { from: from, to: to, distanceKm: distanceKm, scenarios: scenarios, departureTime: departureTime, arrivalTime: arrivalTime, chargingTimeMin: chargingTimeMin };

            if (currentMode === 'departure') {
              displayDepartureResults(scenarios, departureTime, chargingTimeMin);
            } else {
              displayArrivalResults(scenarios, arrivalTime, chargingTimeMin);
            }

            // Show map with the result we already have
            try {
              directionsRenderer.setDirections(result);
              var durationMin = Math.round(trafficSec / 60);
              var speedAvg = Math.round(distanceKm / (durationMin / 60));
              document.getElementById('route-distance').textContent = distanceKm.toFixed(1) + ' km';
              document.getElementById('route-duration').textContent = formatDuration(durationMin);
              document.getElementById('route-speed').textContent = speedAvg + ' km/h';
              document.getElementById('map-container').classList.add('visible');

              if (document.getElementById('ev-toggle').checked && lastResults) {
                addChargingMarkers(result.routes[0]);
              }
            } catch (mapErr) {
              console.warn('Map display error:', mapErr);
            }

            if (document.getElementById('ev-toggle').checked) {
              if (chargingTimeMin > 0) {
                displayEVInfo(distanceKm, chargingTimeMin);
              } else if (!document.getElementById('ev-model').value) {
                // EV-Toggle an, aber kein Modell gewählt
                var box = document.getElementById('ev-info-box');
                box.innerHTML = '<div id="ev-info-text">' + t('ev_no_model_hint') + '</div>';
                box.style.display = 'block';
              }
            }

            // Show traffic info for this day/time
            var trafficDelayMin = Math.round((trafficSec - baseSec) / 60);
            var hasTrafficData = !!legs[0].duration_in_traffic;
            // In arrival mode, include charging time to match displayed departure times
            var depTime = departureTime || new Date(arrivalTime.getTime() - (trafficSec + chargingTimeMin * 60) * 1000);
            displayDelayInfo(trafficDelayMin, baseSec, trafficSec, hasTrafficData, depTime, distanceKm);

            // Share-Card befüllen und anzeigen
            var shareFrom = document.getElementById('from').value.trim();
            var shareTo = document.getElementById('to').value.trim();
            var shareWps = getWaypoints();
            lastMapsUrl = buildMapsUrl(shareFrom, shareTo, shareWps, lastChargingStopPositions);
            showShareCard(lastMapsUrl, shareFrom, shareTo);

            resetBtn();
          } catch (e) {
            console.error('Directions callback error:', e);
            showBtnError(t('err_calc', {msg: e.message}));
            resetBtn();
          }
        });
      } catch (e) {
        callbackFired = true;
        console.error('Directions call error:', e);
        showBtnError(t('err_api_call', {msg: e.message}));
        resetBtn();
      }
    }

    /* ── Calculate EV charging time (returns minutes) ── */
    function getChargingTime(distanceKm) {
      const modelId = document.getElementById('ev-model').value;
      if (!modelId) return 0;

      const startBattery = parseInt(document.getElementById('ev-start-battery').value);
      const endBattery = parseInt(document.getElementById('ev-end-battery').value);
      const evData = EV_DATABASE[modelId];
      if (!evData) return 0;

      const realRange = evData.wltp * REAL_WORLD_RANGE_FACTOR;
      const kmPerPercent = realRange / 100;

      // Can we reach destination without charging?
      if (startBattery - distanceKm / kmPerPercent >= endBattery) return 0;

      // Simulate journey: intermediate stops drain to MIN_CHARGE_SOC (10%)
      const MIN_CHARGE_SOC = 10;
      var currentSoC = startBattery;
      var kmCovered = 0;
      var stops = 0;

      while (true) {
        var kmRemaining = distanceKm - kmCovered;
        // Can we reach destination with endBattery remaining?
        if (currentSoC - kmRemaining / kmPerPercent >= endBattery) break;
        // Drive until MIN_CHARGE_SOC, then charge
        var drivableKm = (currentSoC - MIN_CHARGE_SOC) * kmPerPercent;
        kmCovered += drivableKm;
        stops++;
        currentSoC = 80;
        if (stops > 50) break; // safety limit
      }

      return stops * 25; // 25 min per stop
    }

    function displayEVInfo(distanceKm, chargingTimeMin) {
      const stops = Math.ceil(chargingTimeMin / 25);
      const box = document.getElementById('ev-info-box');
      box.innerHTML = '<div id="ev-info-text">' + t('ev_stops_info', {stops: stops, min: chargingTimeMin}) + '</div>';
      box.style.display = 'block';
    }

    function displayDepartureResults(scenarios, departureTime, chargingTimeMin) {
      const chargingSec = chargingTimeMin * 60;

      const arrPessimistic = new Date(departureTime.getTime() + (scenarios.pessimistic.durationSeconds + chargingSec) * 1000);
      const arrBestGuess = new Date(departureTime.getTime() + (scenarios.bestGuess.durationSeconds + chargingSec) * 1000);
      const arrOptimistic = new Date(departureTime.getTime() + (scenarios.optimistic.durationSeconds + chargingSec) * 1000);

      document.getElementById('hero-time').textContent = formatTime(arrBestGuess);
      document.getElementById('hero-label').textContent = t('hero_label_departure');
      let meta = '<div>' + t('hero_meta_departure', {time: formatTime(departureTime), duration: formatDuration(Math.round(scenarios.bestGuess.durationSeconds / 60))}) + '</div>';
      if (chargingTimeMin > 0) meta += '<div>' + t('hero_meta_charging', {min: chargingTimeMin}) + '</div>';
      document.getElementById('hero-meta').innerHTML = meta;
      document.getElementById('hero-card').style.display = 'block';

      document.getElementById('time-optimistic').textContent = formatTime(arrOptimistic);
      document.getElementById('time-best-guess').textContent = formatTime(arrBestGuess);
      document.getElementById('time-pessimistic').textContent = formatTime(arrPessimistic);
      document.getElementById('time-cards').style.display = 'flex';
    }

    function displayArrivalResults(scenarios, targetTime, chargingTimeMin) {
      const chargingSec = chargingTimeMin * 60;

      // Entspannt = pessimistic + charging (leave earliest, most buffer)
      const safeDeparture = new Date(targetTime.getTime() - (scenarios.pessimistic.durationSeconds + chargingSec) * 1000);
      const bestDeparture = new Date(targetTime.getTime() - (scenarios.bestGuess.durationSeconds + chargingSec) * 1000);
      // Knapp = optimistic + charging (leave latest, least buffer)
      const relaxedDeparture = new Date(targetTime.getTime() - (scenarios.optimistic.durationSeconds + chargingSec) * 1000);

      document.getElementById('arrival-safe').textContent = formatTime(safeDeparture);
      document.getElementById('arrival-bestguess').textContent = formatTime(bestDeparture);
      document.getElementById('arrival-relaxed').textContent = formatTime(relaxedDeparture);

      document.getElementById('hero-time').textContent = formatTime(safeDeparture);
      document.getElementById('hero-label').textContent = t('hero_label_arrival');
      let meta = '<div>' + t('hero_meta_arrival', {time: formatTime(targetTime)}) + '</div>';
      if (chargingTimeMin > 0) meta += '<div>' + t('hero_meta_arrival_charging', {min: chargingTimeMin}) + '</div>';
      document.getElementById('hero-meta').innerHTML = meta;
      document.getElementById('hero-card').style.display = 'block';

      document.getElementById('arrival-cards').style.display = 'flex';
    }

    function displayDelayInfo(trafficDelayMin, baseSec, trafficSec, hasTrafficData, depTime, distanceKm) {
      var dayNames = t('weekdays_long');
      var dayName = dayNames[depTime.getDay()];
      var timeStr = String(depTime.getHours()).padStart(2, '0') + ':' + String(depTime.getMinutes()).padStart(2, '0');
      var baseMin = Math.round(baseSec / 60);

      // Determine traffic level based on ratio traffic/base
      var ratio = trafficSec / baseSec;
      var iconClass, text, fillPercent, barGradient, iconContent;

      if (!hasTrafficData || ratio < 1.05) {
        // Free — green dot with checkmark, short green bar
        iconClass = 'green'; iconContent = '✓';
        text = t('traffic_free');
        fillPercent = 15;
        barGradient = 'linear-gradient(90deg, #22a34a, #22a34a)';
      } else if (ratio < 1.15) {
        // Light — green dot, green→yellow bar
        iconClass = 'green'; iconContent = '✓';
        text = t('traffic_light', {min: trafficDelayMin});
        fillPercent = 35;
        barGradient = 'linear-gradient(90deg, #22a34a, #a8c926)';
      } else if (ratio < 1.30) {
        // Moderate — yellow dot, green→yellow bar
        iconClass = 'yellow'; iconContent = '!';
        text = t('traffic_moderate', {min: trafficDelayMin});
        fillPercent = 55;
        barGradient = 'linear-gradient(90deg, #22a34a, #d4960a)';
      } else if (ratio < 1.50) {
        // Heavy — yellow dot, green→yellow→red bar
        iconClass = 'yellow'; iconContent = '!';
        text = t('traffic_heavy', {min: trafficDelayMin});
        fillPercent = 75;
        barGradient = 'linear-gradient(90deg, #22a34a, #d4960a, #e87a1e)';
      } else {
        // Jam — red dot, full green→yellow→red bar
        iconClass = 'red'; iconContent = '!';
        text = t('traffic_jam', {min: trafficDelayMin});
        fillPercent = 100;
        barGradient = 'linear-gradient(90deg, #22a34a, #d4960a, #c53030)';
      }

      var label = t('traffic_label', {day: dayName, time: timeStr});

      // Build contextual detail text — must be consistent with actual traffic data
      var hour = depTime.getHours();
      var day = depTime.getDay(); // 0=So
      var details = [];
      var isRushHourTime = (day >= 1 && day <= 5 && ((hour >= 6 && hour <= 9) || (hour >= 15 && hour <= 18)));
      var isFridayTravel = (day === 5 && hour >= 13 && hour <= 19);

      // Only show "heavy traffic expected" context if the actual data confirms it
      if (isFridayTravel && ratio >= 1.15) {
        details = [t('ctx_friday')];
      } else if (day >= 1 && day <= 5) {
        if (hour >= 6 && hour <= 9) {
          if (ratio >= 1.15) {
            details.push(t('ctx_commute_morning', {day: dayName}));
          } else {
            details.push(t('ctx_commute_morning_clear', {day: dayName}));
          }
        } else if (hour >= 15 && hour <= 18) {
          if (ratio >= 1.15) {
            details.push(t('ctx_commute_evening', {day: dayName}));
          } else {
            details.push(t('ctx_commute_evening_clear', {day: dayName}));
          }
        } else if (hour >= 21 || hour <= 5) {
          details.push(t('ctx_night'));
        } else {
          details.push(t('ctx_off_peak', {day: dayName, time: timeStr}));
        }
      } else {
        if (day === 6 && hour >= 9 && hour <= 14) {
          if (ratio >= 1.15) {
            details.push(t('ctx_sat_morning'));
          } else {
            details.push(t('ctx_weekend', {day: dayName, time: timeStr}));
          }
        } else if (day === 0 && hour >= 15 && hour <= 20) {
          if (ratio >= 1.15) {
            details.push(t('ctx_sun_afternoon'));
          } else {
            details.push(t('ctx_weekend', {day: dayName, time: timeStr}));
          }
        } else {
          details.push(t('ctx_weekend', {day: dayName, time: timeStr}));
        }
      }

      if (distanceKm > 400) {
        details.push(t('ctx_long_distance', {km: Math.round(distanceKm)}));
      }

      if (hasTrafficData && trafficDelayMin > 0) {
        details.push(t('ctx_base_vs_traffic', {base: formatDuration(baseMin), traffic: formatDuration(Math.round(trafficSec / 60))}));
      }

      var iconEl = document.getElementById('delay-icon');
      iconEl.className = 'delay-icon ' + iconClass;
      iconEl.textContent = iconContent;
      document.getElementById('delay-label').textContent = label;
      document.getElementById('delay-text').textContent = text;
      var barFill = document.getElementById('delay-bar-fill');
      barFill.style.width = fillPercent + '%';
      barFill.style.background = barGradient;
      document.getElementById('delay-detail').innerHTML = details.join('<br>');
      document.getElementById('delay-info').style.display = 'block';
    }

    // displayMap removed — map display now integrated into calculateRoute

    function isTesla(modelId) {
      return modelId && modelId.startsWith('tesla-');
    }

    /* ── Interpolate position along route at a given km distance ── */
    function getPositionAtKm(leg, targetKm) {
      var steps = leg.steps || [];
      var cumulKm = 0;
      for (var i = 0; i < steps.length; i++) {
        var stepKm = steps[i].distance.value / 1000;
        if (cumulKm + stepKm >= targetKm) {
          // Target is within this step — interpolate
          var frac = stepKm > 0 ? (targetKm - cumulKm) / stepKm : 0;
          var sLat = steps[i].start_location.lat();
          var sLng = steps[i].start_location.lng();
          var eLat = steps[i].end_location.lat();
          var eLng = steps[i].end_location.lng();
          return { lat: sLat + frac * (eLat - sLat), lng: sLng + frac * (eLng - sLng) };
        }
        cumulKm += stepKm;
      }
      // Past end — return last step end
      var last = steps[steps.length - 1];
      return last ? { lat: last.end_location.lat(), lng: last.end_location.lng() } : null;
    }

    function addChargingMarkers(route) {
      // Clear old markers
      chargingMarkers.forEach(function(m) { try { m.setMap(null); } catch(e){} });
      chargingMarkers = [];

      // Combine all legs into one virtual leg for multi-waypoint routes
      var allLegs = route.legs;
      var combinedLeg = { steps: [], distance: { value: 0 } };
      for (var li = 0; li < allLegs.length; li++) {
        combinedLeg.distance.value += allLegs[li].distance.value;
        var legSteps = allLegs[li].steps || [];
        for (var si = 0; si < legSteps.length; si++) {
          combinedLeg.steps.push(legSteps[si]);
        }
      }
      var leg = combinedLeg;

      var modelId = document.getElementById('ev-model').value;
      if (!modelId) return;

      var startBattery = parseInt(document.getElementById('ev-start-battery').value);
      var endBattery = parseInt(document.getElementById('ev-end-battery').value);
      var evData = EV_DATABASE[modelId];
      if (!evData) return;

      var realRange = evData.wltp * REAL_WORLD_RANGE_FACTOR;
      var distanceKm = leg.distance.value / 1000;
      var tesla = isTesla(modelId);

      // Can we reach destination without charging?
      var kmPerPercent = realRange / 100;
      if (startBattery - distanceKm / kmPerPercent >= endBattery) {
        document.getElementById('charging-stops-list').style.display = 'none';
        lastChargingStopPositions = [];
        return;
      }

      // Simulate journey: intermediate stops drain to MIN_CHARGE_SOC (10%)
      var MIN_CHARGE_SOC = 10;
      var chargingStops = [];
      var currentSoC = startBattery;
      var lastChargeKm = 0;

      for (var safety = 0; safety < 50; safety++) {
        var kmRemaining = distanceKm - lastChargeKm;
        // Can we reach destination with endBattery remaining?
        if (currentSoC - kmRemaining / kmPerPercent >= endBattery) break;

        // Drive until MIN_CHARGE_SOC
        var drivableKm = (currentSoC - MIN_CHARGE_SOC) * kmPerPercent;
        var stopKm = lastChargeKm + drivableKm;
        if (stopKm >= distanceKm - 5) stopKm = distanceKm - 5;

        var kmDriven = stopKm - lastChargeKm;
        var socAtArrival = Math.max(0, Math.round(currentSoC - kmDriven / kmPerPercent));

        var pos = getPositionAtKm(leg, stopKm);
        chargingStops.push({
          stopKm: Math.round(stopKm),
          socAtArrival: socAtArrival,
          position: pos,
          tesla: tesla,
        });

        // After charging: SoC resets to 80%, next segment starts here
        currentSoC = 80;
        lastChargeKm = stopKm;
      }

      var stopsNeeded = chargingStops.length;
      console.log('[Fahrcast] Charging: ' + stopsNeeded + ' stops needed for ' + distanceKm.toFixed(0) + 'km (range=' + realRange.toFixed(0) + 'km, startSoC=' + startBattery + '%)');

      // Save positions for Google Maps share link
      lastChargingStopPositions = chargingStops.filter(function(s) { return s.position; }).map(function(s) { return s.position; });

      // Render all stops immediately
      renderChargingStops(chargingStops, tesla);

      // Add map markers
      chargingStops.forEach(function(stop, idx) {
        if (!stop.position) return;
        try {
          var marker = new google.maps.Marker({
            position: stop.position, map: currentMap,
            title: t('charging_stop_label', {idx: idx + 1, name: '⚡'}),
            icon: {
              url: tesla ? 'https://maps.google.com/mapfiles/ms/icons/red-dot.png' : 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
              scaledSize: new google.maps.Size(36, 36),
            },
          });
          chargingMarkers.push(marker);
        } catch (e) { console.warn('[Fahrcast] Marker error:', e); }
      });
    }

    function renderChargingStops(stopsData, tesla) {
      var listEl = document.getElementById('charging-stops-list');
      var html = '<div class="charging-stops-list">';

      stopsData.forEach(function(stop, idx) {
        var label = tesla ? 'Supercharger' : t('charging_station');
        html += '<div class="charging-stop-card">'
          + '<div class="charging-stop-icon">⚡</div>'
          + '<div class="charging-stop-info">'
          + '<div class="charging-stop-name">' + t('charging_stop_label', {idx: idx + 1, name: label}) + '</div>'
          + '<div class="charging-stop-detail">'
          + t('charging_stop_detail', {km: stop.stopKm, soc: stop.socAtArrival})
          + '</div>'
          + '</div>'
          + '</div>';
      });

      html += '</div>';
      listEl.innerHTML = html;
      listEl.style.display = 'block';
    }

    function formatTime(date) {
      return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
    }

    function formatDuration(minutes) {
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
    }

    function showError(message) {
      document.getElementById('error-container').innerHTML = '<div class="error-message">' + message + '</div>';
      document.getElementById('results').classList.add('visible');
    }

    function showBtnError(message) {
      var el = document.getElementById('btn-error-container');
      el.textContent = message;
      el.style.display = 'block';
      document.getElementById('calculate-btn').textContent = t('calculate_btn');
      document.getElementById('calculate-btn').disabled = false;
    }

    // Global error handler — show ALL JS errors on page
    window.onerror = function(msg, url, line) {
      var el = document.getElementById('error-container');
      if (el) {
        el.innerHTML = '<div class="error-message">' + t('err_js', {msg: msg, line: line}) + '</div>';
        document.getElementById('results').classList.add('visible');
      }
    };

    // Boot: set up UI immediately (don't wait for Maps)
    try { applyI18n(); } catch (e) { console.error('applyI18n error:', e); }
    try { initAllPickers(); } catch (e) { console.error('initAllPickers error:', e); }
    try { setupEventListeners(); } catch (e) { console.error('setupEventListeners error:', e); }
    try { selectTodayWeekday(); } catch (e) { console.error('selectTodayWeekday error:', e); }

    // Language toggle
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentLang = btn.dataset.lang;
        applyI18n();
      });
    });

    console.log('[Fahrcast v38] UI initialized OK, lang=' + currentLang);

    // Timeout: if Maps hasn't loaded after 8 seconds, show clear error
    setTimeout(function() {
      if (!mapsReady) {
        console.error('[Fahrcast] Google Maps did not load within 8 seconds');
        var btn = document.getElementById('calculate-btn');
        btn.textContent = t('calculate_btn_error');
        btn.style.background = 'linear-gradient(135deg, #c53030 0%, #9b2c2c 100%)';
        showBtnError(t('err_maps_timeout'));
      }
    }, 8000);

    // SW management: register new SW, auto-reload when it takes over
    if ('serviceWorker' in navigator) {
      // Auto-reload when a new SW activates and claims this page
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!refreshing) {
          refreshing = true;
          location.reload();
        }
      });
      navigator.serviceWorker.register('./sw.js').catch(function() {});
    }

    window.initApp = initApp;
  </script>

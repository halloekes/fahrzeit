<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><title>API Test v5</title></head>
<body>
<h2>Google Places API Test <small style="color:red">(v5 - full debug)</small></h2>
<input type="text" id="testInput" placeholder="Adresse eingeben (mind. 3 Zeichen)..." style="font-size:18px;padding:10px;width:90%;max-width:500px;">
<div id="log" style="margin-top:20px;font-family:monospace;white-space:pre-wrap;font-size:13px;"></div>

<script>
var debounceTimer = null;
function log(msg) {
  document.getElementById('log').textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
}
log('v5 loaded, waiting for Google Maps...');

function initTest() {
  log('Google Maps v' + (google.maps.version || '?') + ' loaded');

  // Test 1: Geocoder (simplest possible API call)
  log('--- Test 1: Geocoder...');
  var geocoder = new google.maps.Geocoder();
  geocoder.geocode({ address: 'Dresden, Germany' }, function(results, status) {
    log('Geocoder result: status=' + status + ', results=' + (results ? results.length : 'null'));
    if (results && results[0]) {
      log('  -> ' + results[0].formatted_address);
    }
  });

  // Test 2: AutocompleteService with input
  var ac = new google.maps.places.AutocompleteService();
  log('AutocompleteService created');

  document.getElementById('testInput').addEventListener('input', function() {
    var q = this.value.trim();
    if (q.length < 3) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      log('--- Searching: "' + q + '"');

      // Try callback approach
      var ret = ac.getPlacePredictions({
        input: q,
        componentRestrictions: { country: 'de' },
      }, function(predictions, status) {
        log('CALLBACK: status=' + status);
        if (predictions) {
          log('CALLBACK: ' + predictions.length + ' results');
          predictions.slice(0, 3).forEach(function(p, i) {
            log('  ' + (i+1) + '. ' + p.description);
          });
        } else {
          log('CALLBACK: predictions is null');
        }
      });

      // Also check if it returns a promise
      if (ret && typeof ret.then === 'function') {
        log('Also got Promise, awaiting...');
        ret.then(function(r) {
          log('PROMISE OK: ' + JSON.stringify(Object.keys(r)));
        }).catch(function(e) {
          log('PROMISE ERR: ' + e.message + ' | code=' + e.code);
        });
      }
    }, 600);
  });
}
window.initTest = initTest;
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCVxgaDTwgPR8SwgLaB6zHiHNmeQcPPzow&libraries=places&language=de&region=DE&callback=initTest" async defer></script>
</body>
</html>
